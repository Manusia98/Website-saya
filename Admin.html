<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Desa Noebaun</title>


<style>


*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',Arial,sans-serif;

}



body{


min-height:100vh;


background:

linear-gradient(
rgba(0,80,40,.7),
rgba(0,0,0,.6)
),

url("foto/1.png");


background-size:cover;

background-position:center;


display:flex;

justify-content:center;

align-items:center;


}





.container{


width:380px;


background:white;


padding:35px;


border-radius:20px;


box-shadow:0 10px 30px rgba(0,0,0,.4);


text-align:center;


animation: muncul .7s;


}




@keyframes muncul{


from{

transform:translateY(-30px);

opacity:0;

}


to{

transform:translateY(0);

opacity:1;

}


}





.logo{


width:100px;

height:100px;


border-radius:50%;


object-fit:cover;


border:5px solid #0b7a3b;


margin-bottom:15px;


}





h1{


color:#0b7a3b;


font-size:28px;


margin-bottom:5px;


}




.subtitle{


color:#777;

font-size:14px;

margin-bottom:25px;


}






.input-box{


text-align:left;


margin-bottom:18px;


}




.input-box label{


font-size:14px;

color:#444;


}





.input-box input{


width:100%;


padding:13px;


margin-top:7px;


border:1px solid #ccc;


border-radius:10px;


font-size:15px;


}




button{


width:100%;


padding:14px;


background:#0b7a3b;


border:none;


border-radius:10px;


color:white;


font-size:16px;


cursor:pointer;


transition:.3s;


}




button:hover{


background:#075b2d;


}




.menu{


margin-top:25px;


display:flex;


justify-content:space-between;


}



.menu a{


text-decoration:none;


color:#0b7a3b;


font-size:14px;


}





footer{


margin-top:25px;


font-size:12px;


color:#777;


}



</style>


</head>



<body>





<div class="container">





<img src="foto/12.png" class="logo">





<h1>

Admin Desa Noebaun

</h1>



<p class="subtitle">

Panel Pengelola Website Resmi Desa

</p>








<div class="input-box">


<label>

Username

</label>


<input type="text" placeholder="Masukkan username">


</div>







<div class="input-box">


<label>

Password

</label>


<input type="password" placeholder="Masukkan password">


</div>







<button>


🔐 Login Admin


</button>









<div class="menu">


<a href="index.html">

← Beranda

</a>


<a href="kontak.html">

Kontak

</a>


</div>






<footer>


© 2026 Pemerintah Desa Noebaun

</footer>







</div>





</body>


</html>
